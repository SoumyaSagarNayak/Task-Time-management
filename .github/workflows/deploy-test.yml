name: Deploy (Test)

on:
  push:
    branches:
      - test
    paths:
      - 'backend/**'
      - 'my-app/**'
      - '.github/workflows/deploy-test.yml'

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: time-entry-test-backend-app
  ECS_CLUSTER: time-entry-test-backend-cluster
  ECS_SERVICE: time-entry-test-backend-task-service
  MIGRATION_TASK_DEF: time-entry-test-backend-migrate-task
  MIGRATION_SG_NAME: time-entry-test-backend-sg
  SUBNET_TAG_KEY: Name
  SUBNET_TAG_VALUE: time-entry-test-subnet

permissions:
  contents: read
  actions: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      prisma_migrations: ${{ steps.prisma_migrations.outputs.changed }}
      skip_migrate: ${{ steps.skip_migrate.outputs.skip }}
      skip_deploy: ${{ steps.skip_deploy.outputs.skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'my-app/**'

      - name: Lookup last successful test deploy SHA
        id: last_success
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const branch = context.ref.replace('refs/heads/', '');
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'deploy-test.yml',
              branch,
              status: 'success',
              per_page: 1
            });
            const sha = data.workflow_runs?.[0]?.head_sha ?? '';
            core.info(`Last successful test deploy SHA: ${sha || 'none found'}`);
            core.setOutput('sha', sha);

      - name: Detect Prisma migration changes since last test deploy
        id: prisma_migrations
        run: |
          LAST_SUCCESS="${{ steps.last_success.outputs.sha }}"
          TARGET_PATH="backend/prisma/migrations"

          if [ ! -d "$TARGET_PATH" ]; then
            echo "No migrations directory present. Treating as no change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$LAST_SUCCESS" ]; then
            echo "No prior successful test deployment. Running migrations."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$LAST_SUCCESS" HEAD -- "$TARGET_PATH"; then
            echo "No Prisma migration changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Prisma migration changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect skip-prisma-migrate directive in commit message
        id: skip_migrate
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -iq "\[skip prisma migrate\]"; then
            echo "Skip prisma migrate directive found."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No skip directive found."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect skip-test directive in commit message
        id: skip_deploy
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -iq "\[skip test\]"; then
            echo "Skip test directive found."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No skip directive found."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug changes
        run: |
          echo "Backend changes detected: ${{ steps.filter.outputs.backend }}"
          echo "Frontend changes detected: ${{ steps.filter.outputs.frontend }}"
          echo "Prisma migrations changed: ${{ steps.prisma_migrations.outputs.changed }}"
          echo "Skip prisma migrate flag: ${{ steps.skip_migrate.outputs.skip }}"
          echo "Skip test deploy flag: ${{ steps.skip_deploy.outputs.skip }}"

  deploy-backend:
    name: Build and Deploy Backend (Test)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' && needs.changes.outputs.skip_deploy != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
        run: pnpm exec prisma generate

      - name: Build application
        working-directory: ./backend
        run: pnpm build

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./backend
        run: |
          # Build Docker image (no tag = implicitly uses :latest)
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY .

          # Also tag with SHA for traceability
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY $ECR_REGISTRY/$ECR_REPOSITORY:test-$IMAGE_TAG

          # Push both: untagged (latest) and SHA-tagged
          docker push $ECR_REGISTRY/$ECR_REPOSITORY
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:test-$IMAGE_TAG

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY" >> $GITHUB_OUTPUT

      - name: Force ECS to pull latest image
        run: |
          echo "Forcing ECS service to pull latest image..."
          echo "Service will pull: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"

          # Force new deployment - ECS will pull the image (default :latest)
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deployment summary
        run: |
          echo "✅ Backend deployment triggered successfully (Test)!"
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "ECS Service: ${{ env.ECS_SERVICE }}"
          echo "Cluster: ${{ env.ECS_CLUSTER }}"
          echo "Deployment is in progress. ECS will pull the updated image."

  deploy-frontend:
    name: Deploy Frontend to Vercel (Test)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && needs.changes.outputs.skip_deploy != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Test Environment Preview)
        working-directory: ./my-app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TEST }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "ERROR: VERCEL_ORG_ID secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ERROR: VERCEL_PROJECT_ID secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi

          # Link project if not already linked (non-interactive)
          if [ ! -f .vercel/project.json ]; then
            echo "Linking Vercel test project..."
            vercel link --yes --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --project=$VERCEL_PROJECT_ID || true
          fi

          # Deploy to production on test environment
          vercel deploy --prod --yes --token=$VERCEL_TOKEN

      - name: Deployment summary
        run: |
          echo "✅ Test environment frontend deployment to Vercel triggered successfully!"
          echo "Preview deployment is in progress. Check Vercel dashboard for status."
          echo "Project ID: ${{ secrets.VERCEL_PROJECT_ID_TEST }}"
