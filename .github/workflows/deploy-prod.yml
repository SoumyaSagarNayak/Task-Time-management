name: Deploy (Prod)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'my-app/**'
      - '.github/workflows/deploy-prod.yml'
permissions:
  contents: read
  actions: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      prisma_migrations: ${{ steps.prisma_migrations.outputs.changed }}
      skip_migrate: ${{ steps.skip_migrate.outputs.skip }}
      skip_deploy: ${{ steps.skip_deploy.outputs.skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'my-app/**'

      - name: Lookup last successful prod deploy SHA
        id: last_success
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const branch = context.ref.replace('refs/heads/', '');
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'deploy-prod.yml',
              branch,
              status: 'success',
              per_page: 1
            });
            const sha = data.workflow_runs?.[0]?.head_sha ?? '';
            core.info(`Last successful prod deploy SHA: ${sha || 'none found'}`);
            core.setOutput('sha', sha);

      - name: Detect Prisma migration changes since last prod deploy
        id: prisma_migrations
        run: |
          LAST_SUCCESS="${{ steps.last_success.outputs.sha }}"
          TARGET_PATH="backend/prisma/migrations"

          if [ ! -d "$TARGET_PATH" ]; then
            echo "No migrations directory present. Treating as no change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$LAST_SUCCESS" ]; then
            echo "No prior successful prod deployment. Running migrations."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$LAST_SUCCESS" HEAD -- "$TARGET_PATH"; then
            echo "No Prisma migration changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Prisma migration changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect skip-prisma-migrate directive in commit message
        id: skip_migrate
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -iq "\[skip prisma migrate\]"; then
            echo "Skip prisma migrate directive found."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No skip directive found."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect skip-prod directive in commit message
        id: skip_deploy
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -iq "\[skip prod\]"; then
            echo "Skip prod directive found."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No skip directive found."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug changes
        run: |
          echo "Backend changes detected: ${{ steps.filter.outputs.backend }}"
          echo "Frontend changes detected: ${{ steps.filter.outputs.frontend }}"
          echo "Prisma migrations changed: ${{ steps.prisma_migrations.outputs.changed }}"
          echo "Skip prisma migrate flag: ${{ steps.skip_migrate.outputs.skip }}"
          echo "Skip prod deploy flag: ${{ steps.skip_deploy.outputs.skip }}"

  deploy-backend:
    name: Deploy Backend to Vercel (Prod)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' && needs.changes.outputs.skip_deploy != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy Backend to Vercel (Prod Environment)
        working-directory: ./backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_PROD }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "ERROR: VERCEL_ORG_ID secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ERROR: VERCEL_PROJECT_ID_BACKEND_PROD secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi

          # Link project if not already linked (non-interactive)
          if [ ! -f .vercel/project.json ]; then
            echo "Linking Vercel prod backend project..."
            vercel link --yes --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --project=$VERCEL_PROJECT_ID || true
          fi

          # Deploy to production on prod environment
          vercel deploy --prod --yes --token=$VERCEL_TOKEN

      - name: Deployment summary
        run: |
          echo "✅ Prod environment backend deployment to Vercel triggered successfully!"
          echo "Project ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_PROD }}"

  deploy-frontend:
    name: Deploy Frontend to Vercel (Prod)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && needs.changes.outputs.skip_deploy != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Prod Environment Preview)
        working-directory: ./my-app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "ERROR: VERCEL_ORG_ID secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ERROR: VERCEL_PROJECT_ID secret is missing. Please add it to your GitHub repository secrets."
            exit 1
          fi

          # Link project if not already linked (non-interactive)
          if [ ! -f .vercel/project.json ]; then
            echo "Linking Vercel prod project..."
            vercel link --yes --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --project=$VERCEL_PROJECT_ID || true
          fi

          # Deploy to production on prod environment
          vercel deploy --prod --yes --token=$VERCEL_TOKEN

      - name: Deployment summary
        run: |
          echo "✅ Prod environment frontend deployment to Vercel triggered successfully!"
          echo "Preview deployment is in progress. Check Vercel dashboard for status."
          echo "Project ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}"
